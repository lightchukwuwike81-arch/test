<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Registration - Bright Future University</title>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<header>
Bright Future University
</header>

<section class="form-section">

<h2>Student Registration Portal</h2>

<form class="registration-form">

<label>Full Name</label>
<input type="text" placeholder="Enter Full Name" required>

<label>Date of Birth</label>
<input type="date" required>

<label>Gender</label>
<select required>
<option value="">Select Gender</option>
<option>Male</option>
<option>Female</option>
</select>

<label>Nationality</label>
<input type="text" placeholder="Enter Nationality" required>

<label>Phone Number</label>
<input type="tel" placeholder="Enter Phone Number" required>

<label>Email</label>
<input type="email" placeholder="Enter Email Address" required>

<label>Address</label>
<input type="text" placeholder="Enter Contact Address" required>

<label>Course of Study</label>
<input type="text" placeholder="Enter Course of Study" required>

<label>Year of Entry</label>
<select required>
<option value="">Select Year</option>
<option>2024</option>
<option>2025</option>
<option>2026</option>
<option>2027</option>
</select>

<label>Level</label>
<select required>
<option value="">Select Level</option>
<option>100 Level</option>
<option>200 Level</option>
<option>300 Level</option>
<option>400 Level</option>
</select>

<label>Matric Number</label>
<input type="text" placeholder="Enter Matric Number">

<button type="submit" class="submit-btn">Submit Registration</button>

</form>

</section>

</body>

</html>
