```html
<!DOCTYPE html>
<html>
<head>
<title>Student Registration - Bright Future University</title>

<style>

body{
font-family:Arial;
background:#f4f6fa;
margin:0;
}

.container{
width:450px;
margin:50px auto;
background:white;
padding:30px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
text-align:center;
color:#0f4c81;
}

input,select{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:12px;
background:#1e90ff;
color:white;
border:none;
font-size:18px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0066cc;
}

</style>

</head>

<body>

<div class="container">

<h2>University Student Registration</h2>

<form>

<label>Full Name</label>
<input type="text" required>

<label>Date of Birth</label>
<input type="date" required>

<label>Gender</label>
<select required>
<option>Male</option>
<option>Female</option>
</select>

<label>Nationality</label>
<input type="text" required>

<label>Phone Number</label>
<input type="tel" required>

<label>Email</label>
<input type="email" required>

<label>Contact Address</label>
<input type="text" required>

<label>Matric Number</label>
<input type="text">

<label>Course of Study</label>
<input type="text" required>

<label>Year of Entry</label>
<input type="number" required>

<label>Level</label>
<select>
<option>100</option>
<option>200</option>
<option>300</option>
<option>400</option>
</select>

<button type="submit">Submit Registration</button>

</form>

</div>

</body>
</html>
```
