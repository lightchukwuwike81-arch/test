```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Registration</title>
<link rel="stylesheet" href="style.css">
<script defer src="script.js"></script>
</head>

<body>

<div class="form-container">

<h2>Student Registration Form</h2>

<form id="studentForm">

<input type="text" placeholder="Full Name" required>

<input type="date" required>

<input type="text" placeholder="Nationality" required>

<select required>
<option value="">Select Gender</option>
<option>Male</option>
<option>Female</option>
</select>

<input type="email" placeholder="Email Address" required>

<input type="tel" placeholder="Phone Number" required>

<input type="text" placeholder="Contact Address" required>

<input type="text" placeholder="Matric Number" required>

<input type="text" placeholder="Course of Study" required>

<input type="number" placeholder="Year of Entry" required>

<select required>
<option value="">Select Level</option>
<option>100 Level</option>
<option>200 Level</option>
<option>300 Level</option>
<option>400 Level</option>
</select>

<button type="submit">Submit Registration</button>

</form>

</div>

</body>
</html>
```
